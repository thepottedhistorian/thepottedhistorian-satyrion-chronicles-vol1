<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Satyrion Chronicles, Vol. I: The Binary Root</title>
    <style>
        /* Scriptorium Atmosphere */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            overflow: hidden; 
            background-color: #1a140f; 
        }

        #viewer-container { 
            width: 100%; 
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Deep glow behind the book to simulate a focused reading desk */
            background: radial-gradient(circle, #3d2f24 0%, #1a140f 100%);
        }

        iframe { 
            width: 100%; 
            height: 100%; 
            border: none;
            /* PARCHMENT FILTER: This warms the pages to an aged vellum tone */
            filter: sepia(0.35) brightness(0.92) contrast(1.1);
            box-shadow: 0 0 60px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <div id="viewer-container">
        <iframe 
            src="https://flowpaper.com/flipbook/https://thepottedhistorian.netlify.app/SatyrionChronicles_volume1_thebinaryroot.pdf" 
            allowfullscreen>
        </iframe>
    </div>

</body>
</html>
