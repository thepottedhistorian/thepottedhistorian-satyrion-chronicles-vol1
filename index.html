<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Satyrion Chronicles, Vol. I: The Binary Root</title>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            overflow: hidden; 
            /* A rich, dark wood/leather background for the "desk" */
            background: #1a140f; 
        }

        #viewer-container { 
            width: 100%; 
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Creating a parchment-like "glow" behind the book */
            background: radial-gradient(circle, #3d2f24 0%, #1a140f 100%);
        }

        iframe { 
            width: 100%; 
            height: 100%; 
            border: none;
            /* STYLING THE PAGES: 
               Sepia adds the yellowed age, 
               Brightness takes off the digital glare,
               Contrast keeps your woodcuts sharp. */
            filter: sepia(0.35) brightness(0.92) contrast(1.1);
            box-shadow: 0 0 60px rgba(0,0,0,0.7);
        }
    </style>
</head>
<body>

    <div id="viewer-container">
        <iframe 
            src="https://flowpaper.com/flipbook/https://satyrion-chroniclesv1.netlify.app/SatyrionChroniclesvolume1.pdf?v=2.2" 
            allowfullscreen>
        </iframe>
    </div>

</body>
